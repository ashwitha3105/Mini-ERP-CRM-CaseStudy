services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mini_erp_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data", "./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro", "./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro"]
  backend:
    build: { context: ., dockerfile: Dockerfile.backend }
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/mini_erp_crm
      JWT_SECRET: local-development-secret-change-me
      FRONTEND_URL: http://localhost:5173
    ports: ["5000:5000"]
    depends_on: [db]
  frontend:
    build: { context: ., dockerfile: Dockerfile.frontend }
    ports: ["5173:80"]
    depends_on: [backend]
volumes:
  postgres_data:
